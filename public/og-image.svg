<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#fff7ed"/>
  <!-- Gradient background -->
  <rect width="1200" height="630" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Background circles for visual depth -->
  <circle cx="1050" cy="120" r="200" fill="white" fill-opacity="0.05"/>
  <circle cx="150" cy="520" r="160" fill="white" fill-opacity="0.05"/>
  <!-- Logo icon -->
  <rect x="80" y="195" width="100" height="100" rx="24" fill="white" fill-opacity="0.2"/>
  <path d="M112 215v60M112 215c0 0 14 7 14 20s-14 17-14 17" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M148 215v20M148 225h-10M148 225h10M148 235v40" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Title text -->
  <text x="200" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="white">Food</text>
  <text x="440" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#fef08a">Finder</text>
  <!-- Tagline -->
  <text x="80" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="white" fill-opacity="0.9">Compare delivery fees across Uber Eats, DoorDash &amp; Grubhub</text>
  <!-- Platform badges -->
  <rect x="80" y="390" width="160" height="48" rx="24" fill="black" fill-opacity="0.5"/>
  <text x="160" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white">Uber Eats</text>
  <rect x="260" y="390" width="160" height="48" rx="24" fill="black" fill-opacity="0.5"/>
  <text x="340" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white">DoorDash</text>
  <rect x="440" y="390" width="160" height="48" rx="24" fill="black" fill-opacity="0.5"/>
  <text x="520" y="420" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="white">Grubhub</text>
  <!-- CTA -->
  <text x="80" y="510" font-family="system-ui, sans-serif" font-size="28" fill="white" fill-opacity="0.8">Find the best deal. Save on every order.</text>
</svg>
